<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XCourses</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

<header class="p-3 text-bg-dark"> 
<div class="container">
<div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"> 
<a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none"></a>
<ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"> 
<li><a href="index.html" class="nav-link px-2 text-white">Home</a></li>
<li><a href="courses.html" class="nav-link px-2 text-white">Courses</a></li> 
<li><a href="faq.html" class="nav-link px-2 text-white">FAQs</a></li>
<li><a href="about.html" class="nav-link px-2 text-white">About</a></li> 
</ul> 
<div class="text-end"> 
<a href="signin.html" class="btn btn-outline-light me-2">Login</a> 
<a href="signup.html" class="btn btn-warning">Sign-up</a>
</div> 
</div> 
</div> 
</header>

<div class="container d-flex align-items-center justify-content-center" style="min-height:80vh;">
<div class="col-md-5">

<div class="card shadow">
<div class="card-body p-4">

<h3 class="text-center mb-4">Sign In</h3>

<form id="signinForm">
<div class="mb-3">
<label class="form-label">Email address</label>
<input type="email" id="email" class="form-control">
<div class="text-danger small" id="emailError"></div>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" id="password" class="form-control">
<div class="text-danger small" id="passwordError"></div>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="remember">
<label class="form-check-label" for="remember">Remember me</label>
</div>

<button type="submit" class="btn btn-primary w-100">Sign In</button>

<p class="text-center mt-3">Don't have an account? <a href="signup.html">Sign Up</a></p>

</form>

</div>
</div>

</div>
</div>

<div class="container">
<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
<div class="col-md-4 d-flex align-items-center">
<a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1">
<svg class="bi" width="30" height="24">
<use xlink:href="#bootstrap"></use>
</svg>
</a>
<span class="mb-3 mb-md-0 text-body-secondary">© 2026 XCourses, Inc</span>
</div>
<ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
<li class="ms-3">
<a class="text-body-secondary" href="#">
<svg class="bi" width="24" height="24">
<use xlink:href="#instagram"></use>
</svg>
</a>
</li>
<li class="ms-3">
<a class="text-body-secondary" href="#">
<svg class="bi" width="24" height="24">
<use xlink:href="#facebook"></use>
</svg>
</a>
</li>
</ul>
</footer>
</div>

<script>
document.getElementById("signinForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    let emailError = document.getElementById("emailError");
    let passwordError = document.getElementById("passwordError");

    emailError.textContent = "";
    passwordError.textContent = "";

    let isValid = true;

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(email === ""){
        emailError.textContent = "Email is required";
        isValid = false;
    } else if(!email.match(emailPattern)){
        emailError.textContent = "Enter a valid email";
        isValid = false;
    }

    if(password === ""){
        passwordError.textContent = "Password is required";
        isValid = false;
    } else if(password.length < 6){
        passwordError.textContent = "Password must be at least 6 characters";
        isValid = false;
    }

    if(isValid){
        alert("Login successful");
    }
});
</script>

</body>
</html>
